---
- name: Deploy Smart Hostel with Docker Compose
  hosts: app
  become: true
  gather_facts: false

  vars:
    app_dir: /opt/smart_hostel
    repo_url: https://github.com/Devydv/Smart-Hoste.git
    repo_branch: main
    install_packages: false
    enable_observability: true

  tasks:
    - name: Install required system packages
      apt:
        name:
          - git
          - docker.io
          - docker-compose
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: install_packages | bool

    - name: Ensure Docker service is running
      service:
        name: docker
        enabled: true
        state: started

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Allow root to manage repo in deployment directory
      shell: |
        git config --global --get-all safe.directory | grep -Fx "{{ app_dir }}" >/dev/null || \
        git config --global --add safe.directory "{{ app_dir }}"
      changed_when: false

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: true

    - name: Validate compose configuration (runtime parity guard)
      shell: |
        if docker compose version >/dev/null 2>&1; then
          docker compose config >/dev/null
        else
          docker-compose config >/dev/null
        fi
      args:
        chdir: "{{ app_dir }}"

    - name: Build and start containers
      shell: |
        if docker compose version >/dev/null 2>&1; then
          docker compose up -d --build web
        else
          docker-compose rm -sf web mysql || true
          docker-compose up -d --build --force-recreate mysql web
        fi
      args:
        chdir: "{{ app_dir }}"

    - name: Start observability stack
      when: enable_observability | bool
      shell: |
        if docker compose version >/dev/null 2>&1; then
          docker compose -f docker-compose.yml -f infra/observability/docker-compose.observability.yml up -d prometheus grafana
        else
          docker-compose -f docker-compose.yml -f infra/observability/docker-compose.observability.yml up -d prometheus grafana
        fi
      args:
        chdir: "{{ app_dir }}"
