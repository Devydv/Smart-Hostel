---
- name: Deploy Smart Hostel with Docker Compose
  hosts: app
  become: true
  gather_facts: false

  vars:
    app_dir: /opt/smart_hostel
    repo_url: https://github.com/Devydv/Smart-Hoste.git
    repo_branch: main
    install_packages: false
    enable_observability: true
    web_image: ""
    ghcr_username: ""
    ghcr_token: ""

  tasks:
    - name: Install required system packages
      apt:
        name:
          - git
          - docker.io
          - docker-compose
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: install_packages | bool

    - name: Ensure Docker service is running
      service:
        name: docker
        enabled: true
        state: started

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Allow root to manage repo in deployment directory
      shell: |
        git config --global --get-all safe.directory | grep -Fx "{{ app_dir }}" >/dev/null || \
        git config --global --add safe.directory "{{ app_dir }}"
      changed_when: false

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: true

    - name: Login to GHCR for private image pulls
      when:
        - web_image | length > 0
        - ghcr_username | length > 0
        - ghcr_token | length > 0
      shell: |
        echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_username }}" --password-stdin
      no_log: true

    - name: Create compose override for prebuilt web image
      when: web_image | length > 0
      copy:
        dest: "{{ app_dir }}/docker-compose.deploy.yml"
        mode: "0644"
        content: |
          services:
            web:
              image: {{ web_image }}

    - name: Remove compose override when using source build
      when: web_image | length == 0
      file:
        path: "{{ app_dir }}/docker-compose.deploy.yml"
        state: absent

    - name: Validate compose configuration (best effort parity guard)
      shell: |
        if docker compose version >/dev/null 2>&1; then
          timeout 90s docker compose config >/dev/null
        else
          timeout 90s docker-compose config >/dev/null
        fi
      register: compose_validate
      changed_when: false
      failed_when: false
      args:
        chdir: "{{ app_dir }}"

    - name: Build and start containers (resilient)
      shell: |
        for attempt in 1 2 3; do
          if docker compose version >/dev/null 2>&1; then
            if [ -n "{{ web_image }}" ]; then
              if timeout 15m docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull web && \
                 timeout 15m docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --no-build web; then
                exit 0
              fi
            else
              if timeout 20m docker compose up -d --build web; then
                exit 0
              fi
            fi
          else
            if [ -n "{{ web_image }}" ]; then
              if timeout 15m docker-compose -f docker-compose.yml -f docker-compose.deploy.yml pull web && \
                 timeout 15m docker-compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --no-build web; then
                exit 0
              fi
            else
              docker-compose rm -sf web mysql || true
              if timeout 20m docker-compose up -d --build --force-recreate mysql web; then
                exit 0
              fi
            fi
          fi
          echo "Web container build/start failed on attempt ${attempt}, retrying in 20s..."
          sleep 20
        done
        exit 1
      environment:
        COMPOSE_HTTP_TIMEOUT: "600"
        DOCKER_CLIENT_TIMEOUT: "600"
        COMPOSE_PARALLEL_LIMIT: "1"
      args:
        chdir: "{{ app_dir }}"

    - name: Start observability stack (resilient)
      when: enable_observability | bool
      shell: |
        for attempt in 1 2 3; do
          if docker compose version >/dev/null 2>&1; then
            if docker compose -f docker-compose.yml -f infra/observability/docker-compose.observability.yml up -d prometheus grafana; then
              exit 0
            fi
          else
            if docker-compose -f docker-compose.yml -f infra/observability/docker-compose.observability.yml up -d prometheus grafana; then
              exit 0
            fi
          fi
          echo "Observability startup failed on attempt ${attempt}, retrying in 20s..."
          sleep 20
        done
        exit 1
      environment:
        COMPOSE_HTTP_TIMEOUT: "240"
      register: observability_start
      changed_when: observability_start.rc == 0
      failed_when: false
      args:
        chdir: "{{ app_dir }}"

    - name: Continue when observability startup is degraded
      when:
        - enable_observability | bool
        - observability_start.rc != 0
      debug:
        msg: "Observability stack did not come up in time; app deployment continues."
