services:
  mysql:
    image: mysql:8.4
    container_name: smart-hostel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: hostel_management
      MYSQL_USER: hostel
      MYSQL_PASSWORD: hostel_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 12

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: smart-hostel-mysqld-exporter
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - "--mysqld.address=mysql:3306"
      - "--mysqld.username=hostel"
    environment:
      MYSQLD_EXPORTER_PASSWORD: hostel_pass

  web:
    build: .
    container_name: smart-hostel-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: hostel
      DB_PASSWORD: hostel_pass
      DB_NAME: hostel_management
      ENABLE_METRICS: "true"
    ports:
      - "${WEB_PORT:-5000}:5000"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: smart-hostel-prometheus
    restart: unless-stopped
    depends_on:
      - web
      - mysqld-exporter
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: smart-hostel-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
